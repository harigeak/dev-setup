###############################################################################
# .github/workflows/deploy.yml
# CI/CD pipeline using OIDC keyless auth — no long-lived AWS credentials.
#
# Jobs:
#   build  → lint, test, build Docker image, push to ECR
#   deploy → register new ECS task definition, update Fargate service
#            also syncs DAGs to MWAA S3 bucket
#
# Required GitHub Actions secrets (repository or environment level):
#   AWS_CI_ROLE_ARN   — from terraform output: module.github_actions.ci_role_arn
#   AWS_CD_ROLE_ARN   — from terraform output: module.github_actions.cd_role_arn
#
# Required GitHub Actions variables:
#   AWS_REGION         — e.g. us-east-1
#   ECR_REPOSITORY     — from terraform output: module.fargate_app.ecr_repository_url
#   ECS_CLUSTER        — from terraform output: module.fargate_app.ecs_cluster_name
#   ECS_SERVICE        — from terraform output: module.fargate_app.ecs_service_name
#   MWAA_DAG_BUCKET    — from terraform output: module.mwaa.mwaa_dag_bucket_id
###############################################################################

name: Build & Deploy

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE: ${{ vars.ECS_SERVICE }}
  MWAA_DAG_BUCKET: ${{ vars.MWAA_DAG_BUCKET }}

permissions:
  id-token: write   # Required for OIDC token generation
  contents: read

jobs:
  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.push.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CI_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build, tag & push image
        id: push
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          # Also tag as latest on main
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            docker tag "$IMAGE_URI" "$REGISTRY/$ECR_REPOSITORY:latest"
            docker push "$REGISTRY/$ECR_REPOSITORY:latest"
          fi
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ─── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Fargate
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — CD role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_CLUSTER }}" \
            --query taskDefinition \
            > task-definition.json

      - name: Update image in task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ needs.build.outputs.image }}

      - name: Deploy to ECS Fargate
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Sync DAGs to MWAA S3 bucket
        run: |
          aws s3 sync ./dags/ s3://${{ env.MWAA_DAG_BUCKET }}/dags/ \
            --delete \
            --exclude "*.pyc" \
            --exclude "__pycache__/*"
          # Sync requirements if changed
          if git diff --name-only HEAD~1 | grep -q "requirements.txt"; then
            aws s3 cp requirements.txt s3://${{ env.MWAA_DAG_BUCKET }}/requirements.txt
            echo "requirements.txt updated — MWAA will pick up on next refresh"
          fi

      - name: Deployment summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ needs.build.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: \`${{ env.ECS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: \`${{ env.ECS_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **DAGs synced**: \`s3://${{ env.MWAA_DAG_BUCKET }}/dags/\`" >> $GITHUB_STEP_SUMMARY
